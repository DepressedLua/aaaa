<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Чат</title>
    
    <style>
        /* ============================================
           ПЕРЕМЕННЫЕ
           ============================================ */
        :root {
            --bg: #0a0a0a;
            --bg-chat: #0a0a0a;
            --bg-bubble-user: #007aff;
            --bg-bubble-bot: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-bubble-user: #ffffff;
            --text-bubble-bot: #ffffff;
            --border: rgba(255,255,255,0.05);
        }
        
        [data-theme="light"] {
            --bg: #f2f2f7;
            --bg-chat: #ffffff;
            --bg-bubble-user: #007aff;
            --bg-bubble-bot: #e9e9ed;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --text-bubble-user: #ffffff;
            --text-bubble-bot: #000000;
            --border: rgba(0,0,0,0.05);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 932px;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        @media (min-width: 431px) {
            .app { border-radius: 32px; height: 90vh; }
        }
        
        .header {
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-chat);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        
        .header-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .theme-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
            opacity: 0.6;
        }
        
        .theme-btn:hover { opacity: 1; color: var(--text-primary); }
        
        .clear-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
            opacity: 0.5;
        }
        
        .clear-btn:hover { opacity: 1; color: #ff3b30; }
        
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
            background: var(--bg-chat);
            transition: all 0.3s ease;
        }
        
        .chat::-webkit-scrollbar { width: 0; }
        
        .message {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: messageIn 0.3s ease;
            gap: 2px;
        }
        
        @keyframes messageIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; }
        
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.45;
            word-wrap: break-word;
            letter-spacing: -0.2px;
            transition: all 0.2s;
        }
        
        .message.bot .bubble {
            background: var(--bg-bubble-bot);
            color: var(--text-bubble-bot);
            border-bottom-left-radius: 4px;
        }
        
        .message.user .bubble {
            background: var(--bg-bubble-user);
            color: var(--text-bubble-user);
            border-bottom-right-radius: 4px;
        }
        
        .time {
            font-size: 11px;
            color: var(--text-secondary);
            padding: 0 4px;
            margin-top: 2px;
            opacity: 0.7;
            letter-spacing: 0.2px;
        }
        
        .message.bot .time { padding-left: 12px; }
        .message.user .time { padding-right: 12px; text-align: right; }
        
        .typing {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            background: var(--bg-bubble-bot);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            animation: messageIn 0.3s ease;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typingBounce 1.4s infinite;
            opacity: 0.4;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        .input-area {
            padding: 10px 16px 16px;
            background: var(--bg-chat);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-bubble-bot);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .input-wrapper:focus-within {
            border-color: var(--bg-bubble-user);
        }
        
        .input-wrapper textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            padding: 8px 0;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.4;
            letter-spacing: -0.2px;
        }
        
        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        
        .input-wrapper .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-bubble-user);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0.3;
            transform: scale(1);
        }
        
        .input-wrapper .send-btn.active { opacity: 1; }
        .input-wrapper .send-btn:active { transform: scale(0.92); }
        
        @media (max-width: 430px) {
            .app { border-radius: 0 !important; max-height: 100vh; }
        }
        
        @media (max-width: 380px) {
            .bubble { font-size: 15px; padding: 8px 12px; }
            .header-title { font-size: 16px; }
            .message { max-width: 88%; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">🤖 AI Чат</div>
            <div class="header-actions">
                <button class="clear-btn" onclick="clearChat()" title="Очистить">🗑️</button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
        </div>
        
        <!-- CHAT -->
        <div class="chat" id="chat">
            <div class="message bot">
                <div class="bubble">Привет! Я AI ассистент. Чем могу помочь? 🚀</div>
                <div class="time">12:00</div>
            </div>
        </div>
        
        <!-- INPUT -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" rows="1" placeholder="Сообщение..." 
                    onkeydown="handleKey(event)" 
                    oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // TELEGRAM WEBAPP - ОТПРАВКА ЗАПРОСОВ К БОТУ
        // ============================================
        let tg = null;
        let userData = null;
        let isInTelegram = false;
        
        try {
            tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
                isInTelegram = true;
                if (tg.initDataUnsafe?.user) {
                    userData = tg.initDataUnsafe.user;
                    console.log('👤 Пользователь:', userData);
                }
            }
        } catch(e) {
            console.log('⚠️ Не в Telegram WebApp');
        }
        
        // ============================================
        // ТЕМА
        // ============================================
        let theme = localStorage.getItem('theme') || 'dark';
        const themeBtn = document.getElementById('themeBtn');
        
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            theme = t;
            localStorage.setItem('theme', t);
            themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
        }
        
        function toggleTheme() { applyTheme(theme === 'dark' ? 'light' : 'dark'); }
        applyTheme(theme);
        
        // ============================================
        // ЧАТ
        // ============================================
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        let processing = false;
        
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
            sendBtn.classList.toggle('active', el.value.trim().length > 0);
        }
        
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function getTime() {
            return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        }
        
        function addMessage(role, text, time) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="bubble">${text}</div>
                <div class="time">${time || getTime()}</div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.innerHTML = `<span></span><span></span><span></span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }
        
        function clearChat() {
            if (confirm('Очистить все сообщения?')) {
                chat.innerHTML = `
                    <div class="message bot">
                        <div class="bubble">История очищена. Начни новый диалог! 🧹</div>
                        <div class="time">${getTime()}</div>
                    </div>
                `;
                
                // Отправляем запрос на очистку боту (если в Telegram)
                if (tg) {
                    tg.sendData(JSON.stringify({action: 'clear'}));
                }
            }
        }
        
        // ============================================
        // ОТПРАВКА СООБЩЕНИЯ В БОТА
        // ============================================
        async function sendMessage() {
            const text = input.value.trim();
            if (!text || processing) return;
            
            const time = getTime();
            
            // Добавляем сообщение пользователя
            addMessage('user', text, time);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.classList.remove('active');
            processing = true;
            
            // Показываем печать
            showTyping();
            
            try {
                if (tg) {
                    // ОТПРАВКА В TELEGRAM БОТА ЧЕРЕЗ WebApp
                    console.log('📤 Отправка в бота:', text);
                    tg.sendData(JSON.stringify({
                        action: 'message',
                        message: text
                    }));
                    
                    // Ждем ответ от бота (через сообщение в чате)
                    const response = await waitForBotResponse();
                    hideTyping();
                    addMessage('bot', response, getTime());
                    
                } else {
                    // Локальный режим (вне Telegram)
                    hideTyping();
                    addMessage('bot', '⚠️ Открой бота в Telegram для использования AI', getTime());
                }
                
            } catch (error) {
                hideTyping();
                addMessage('bot', '❌ Ошибка: ' + error.message, getTime());
            }
            
            processing = false;
        }
        
        // ============================================
        // ОЖИДАНИЕ ОТВЕТА ОТ БОТА
        // ============================================
        function waitForBotResponse() {
            return new Promise((resolve) => {
                // Слушаем ответ от бота через сообщения
                const handler = (event) => {
                    // Проверяем, что это ответ от бота
                    if (event.data && event.data.startsWith('🤖')) {
                        const response = event.data.replace('🤖', '').trim();
                        document.removeEventListener('webapp_data', handler);
                        resolve(response);
                    }
                };
                document.addEventListener('webapp_data', handler);
                
                // Таймаут 30 секунд
                setTimeout(() => {
                    document.removeEventListener('webapp_data', handler);
                    resolve('⏰ Превышено время ожидания ответа от бота');
                }, 30000);
            });
        }
        
        // ============================================
        // ПЕРЕХВАТ ОТВЕТОВ ОТ БОТА (через WebApp)
        // ============================================
        // Бот отправляет ответы в чат, мы их перехватываем
        if (tg) {
            // Обработка сообщений от бота
            tg.onEvent('message', (msg) => {
                if (msg.text && msg.text.includes('🤖')) {
                    const response = msg.text.replace('🤖', '').trim();
                    document.dispatchEvent(new CustomEvent('webapp_data', {
                        detail: response
                    }));
                }
            });
        }
        
        // Слушаем события от бота
        document.addEventListener('webapp_data', (e) => {
            const response = e.detail;
            if (response && typeof response === 'string' && !response.includes('action')) {
                hideTyping();
                addMessage('bot', response, getTime());
                processing = false;
            }
        });
        
        // ============================================
        // ЗАПУСК
        // ============================================
        chat.scrollTop = chat.scrollHeight;
        console.log('🤖 AI Чат загружен!');
        
        if (isInTelegram) {
            console.log('📱 Запущено в Telegram WebApp');
            console.log('👤 Пользователь:', userData);
            console.log('✅ Отправка сообщений через бота активна');
        } else {
            console.log('⚠️ Запущено вне Telegram. AI не доступен.');
        }
    </script>
</body>
</html>
